apis:
  - aid: carmax:store-locations-api
    name: CarMax Store Locations API
    description: >-
      The CarMax Store Locations API, discussed publicly on the
      CarMax Engineering Blog, exposes details about all CarMax store
      locations including addresses, hours, services offered, and
      geographic metadata. It is consumed primarily by carmax.com,
      the CarMax mobile app, and CarMax's digital marketing and SEO
      systems. The API is not offered as a self-service product to
      third parties.
    humanURL: https://www.carmax.com/stores
    tags:
      - Auto Retail
      - Store Locator
    properties:
      - url: https://www.carmax.com/stores
        type: Documentation
      - url: https://medium.com/carmax-engineering-blog
        type: Engineering Blog
    x-features:
      - Address, hours, and services per store
      - Geographic metadata for mapping
      - Used as a source of truth across CarMax channels
    x-use-cases:
      - Store locator on carmax.com and mobile
      - SEO and local-landing-page generation
      - Internal operations dashboards
  - aid: carmax:vehicle-inventory-api
    name: CarMax Vehicle Inventory API
    description: >-
      The CarMax Vehicle Inventory API exposes details about all
      used vehicles currently in CarMax's nationwide inventory,
      including year/make/model, trim, mileage, price, exterior and
      interior attributes, photos, and stock number. The API powers
      carmax.com's search experience and the Vehicle Detail Page.
      It is consumed internally and surfaced to customers through
      CarMax's own products rather than opened as a public partner
      feed.
    humanURL: https://www.carmax.com/cars
    tags:
      - Auto Retail
      - Automotive
      - Used Cars
      - Vehicle Inventory
    properties:
      - url: https://www.carmax.com/cars
        type: Documentation
      - url: https://medium.com/carmax-engineering-blog/api-roles-aec7999c095c
        type: Engineering Blog
    x-features:
      - Nationwide used-vehicle inventory
      - Year/make/model/trim, mileage, price, stock number
      - Exterior, interior, and photo metadata
      - Powers carmax.com search and VDP
    x-use-cases:
      - Online vehicle search and listing pages
      - Home delivery and store-transfer eligibility
      - Price and market analytics
      - Third-party automotive marketplaces (via syndication agreements)
  - aid: carmax:vehicle-search-sdui-api
    name: CarMax Vehicle Search Server-Driven UI API
    description: >-
      The CarMax Vehicle Search Server-Driven UI API controls the
      search filters and list layouts presented across carmax.com
      and CarMax's mobile apps. It was rewritten approximately three
      years prior to March 2026 and is an example of a Server-Driven
      UI pattern where the back end determines which filters and
      controls render on the client. It is an internal API, not
      published for external developers.
    humanURL: https://www.carmax.com/cars
    tags:
      - Auto Retail
      - Omnichannel
      - Server-Driven UI
    properties:
      - url: https://medium.com/carmax-engineering-blog/api-roles-aec7999c095c
        type: Engineering Blog
    x-features:
      - Server-Driven UI filter and layout payloads
      - Consistent web and mobile experience
      - Back-end controlled A/B testing and rollout
    x-use-cases:
      - Unified search UX across channels
      - Rapid filter experimentation
      - Per-market and per-user personalization
