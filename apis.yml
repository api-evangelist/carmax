name: CarMax
description: >-
  CarMax (NYSE: KMX) is the largest retailer of used cars in the
  United States, operating an omnichannel business that spans
  brick-and-mortar stores, carmax.com online purchasing, home
  delivery, financing, appraisals, and trade-ins. CarMax does not
  publish a public developer portal, but its engineering organization
  operates an extensive internal API program built around distinct
  API roles (Data Access Layer, Business Logic Layer, Server-Driven
  UI, Backend for Frontend). Public-facing APIs documented by the
  CarMax Engineering Blog include a Store Locations API and a
  Vehicle Inventory API, and CarMax has publicly discussed a
  Server-Driven UI API that controls vehicle search filters across
  web and mobile. Partner and syndication integrations are handled
  case by case rather than through a self-service portal.
